name: CI - Build & Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Frontend checks
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Type check
        run: pnpm type-check
      
      - name: Lint
        run: pnpm lint
      
      - name: Build
        run: pnpm build

  # Backend checks
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      
      - name: Download modules
        run: go mod download
      
      - name: Format check
        run: gofmt -l . && [ -z "$(gofmt -l .)" ]
      
      - name: Vet
        run: go vet ./...
      
      - name: Test
        run: go test -v -race ./...

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: npm audit
        run: pnpm audit --audit-level=moderate || true
      
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      
      - name: Run Gosec
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt json -out /tmp/gosec-report.json ./...'
        continue-on-error: true
