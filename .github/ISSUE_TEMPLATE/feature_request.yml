name: "✨ Feature Request"
description: "Suggest an idea for Coredex"
labels: ["enhancement", "triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! We'd love to hear your ideas. 💡

  - type: checkboxes
    id: prerequisites
    attributes:
      label: "Prerequisites"
      description: "Please confirm the following:"
      options:
        - label: "I have searched the existing issues"
          required: true
        - label: "This is not a duplicate of an existing feature request"
          required: true

  - type: textarea
    id: problem
    attributes:
      label: "Problem Statement"
      description: "Is your feature request related to a problem? Describe it."
      placeholder: "I am frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "Describe the solution you'd like"
      placeholder: "It would be great if..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "Any alternative solutions or features you've considered?"

  - type: textarea
    id: additional
    attributes:
      label: "Additional Context"
      description: "Add any other context, mockups, or references"
