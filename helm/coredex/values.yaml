# Default values for coredex.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 3

image:
  repository: cr.yandex/crpfakefake/coredex
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: coredex.ru
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: coredex-tls
      hosts:
        - coredex.ru

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Database configuration
postgresql:
  enabled: false  # Using Yandex Managed PostgreSQL
  auth:
    postgresPassword: ""
    username: coredex
    password: ""
    database: coredex

redis:
  enabled: false  # Using Yandex Managed Redis
  auth:
    password: ""

# Application configuration
config:
  jwtSecret: ""
  dbHost: ""
  dbPort: "5432"
  dbName: "coredex"
  dbUser: ""
  dbPassword: ""
  redisHost: ""
  redisPort: "6379"
  redisPassword: ""
  logLevel: "info"
  corsOrigins: "https://coredex.ru"

# Monitoring
prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s

grafana:
  enabled: true
  adminPassword: "admin"
  service:
    type: ClusterIP
  ingress:
    enabled: true
    hosts:
      - grafana.coredex.ru

# Security
networkPolicy:
  enabled: true

podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Horizontal Pod Autoscaler
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70