services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coredex
      POSTGRES_PASSWORD: coredex
      POSTGRES_DB: coredex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coredex -d coredex"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - deploy/docker.env
    ports:
      - "${COREDEX_PUBLISH_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
